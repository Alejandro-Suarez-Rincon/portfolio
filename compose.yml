version: "3.9"

services:
  core:
    build: ./packages/core
    container_name: portfolio_django_app
    volumes:
      - ./packages/core:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  web:
    build: ./packages/web
    container_name: portfolio_next_web
    volumes:
      - ./packages/web:/app
    ports:
      - "3000:3000"
    
  db:
    image: postgres:17.5
    container_name: portfolio_postgres_db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
